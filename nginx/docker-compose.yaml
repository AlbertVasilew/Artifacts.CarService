version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - prod_cars-service-network
      - dev_cars-service-network
    volumes:
      - /etc/nginx/sites-available/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/html:/etc/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

networks:
  prod_cars-service-network:
    external: true
  dev_cars-service-network:
    external: true