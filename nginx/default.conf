#Production

server {
  listen 443 ssl;
  client_max_body_size 4M;
	server_name api.service.cars-done.com www.api.service.cars-done.com;
 
  ssl_certificate /etc/letsencrypt/live/api.service.cars-done.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.service.cars-done.com/privkey.pem;

	location / {
		proxy_pass http://backend:5000;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server {
  listen 80;
  server_name api.service.cars-done.com www.api.service.cars-done.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
	server_name service.cars-done.com www.service.cars-done.com;
 
     ssl_certificate /etc/letsencrypt/live/service.cars-done.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/service.cars-done.com/privkey.pem;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
  listen 80;
  server_name service.cars-done.com www.service.cars-done.com;
  return 301 https://$host$request_uri;
}

