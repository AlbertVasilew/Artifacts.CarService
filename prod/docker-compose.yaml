version: "3.9"

networks:
  cars-service-network:
    driver: bridge

volumes:
  db-data:

services:
  db:
    image: postgres:16
    container_name: db
    networks:
      - cars-service-network
    environment:
      POSTGRES_DB: cars-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p@ssw0rd
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: /root/prod/Backend.CarService
    image: backend
    container_name: backend
    networks:
      - cars-service-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
    depends_on:
      - db

  frontend:
    build:
      context: /root/prod/cars-service-ui
      args:
        VITE_MODE: production
    image: frontend
    container_name: frontend
    networks:
      - cars-service-network
    depends_on:
      - backend
