version: "3.9"

networks:
  cars-service-network:
    driver: bridge

volumes:
  db-data:

services:
  db:
    image: postgres:16
    container_name: db
    networks:
      - cars-service-network
    environment:
      POSTGRES_DB: cars-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p@ssw0rd
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: /root/prod/Backend.CarService
    image: backend
    container_name: backend
    networks:
      - cars-service-network
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
    depends_on:
      - db

  frontend:
    build:
      context: /root/prod/cars-service-ui
    image: frontend
    container_name: frontend
    networks:
      - cars-service-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    networks:
      - cars-service-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/sites-available/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/html:/etc/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
